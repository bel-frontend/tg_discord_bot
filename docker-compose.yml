version: "3.8"

services:
  tg_discord_bot:
    build: .
    container_name: tg_discord_bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      - mongo
    # volumes:
    #   - ./channels.json:/app/channels.json:ro   # mount the channel mapping

  mongo:
    image: mongo:7
    container_name: tg_discord_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Expose only if you need to connect from the host:
    # ports:
    #   - "27017:27017"

volumes:
  mongo_data:
