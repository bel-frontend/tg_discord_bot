services:
  tg_discord_bot:
    build: .
    container_name: tg_discord_bot
    restart: unless-stopped
    # Chromium reliably crashes on Docker's default 64MB /dev/shm; the browser-session
    # platforms (X, Reddit — see src/browserSessions/) need real headroom here.
    shm_size: '1gb'
    env_file:
      - .env
    environment:
      PORT: "3000"
      MONGODB_URI: ""
      MONGODB_HOST: 10.8.0.34
      MONGODB_PORT: "27028"
      MONGODB_USER: admin
      MONGODB_DB: composer
      MONGODB_AUTH_SOURCE: admin
      MONGODB_REPLICA_SET: rs8
    ports:
      - "3007:3000"
